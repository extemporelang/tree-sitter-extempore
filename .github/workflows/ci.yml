name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Generate and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Generate parser
        run: npx tree-sitter generate

      - name: Run corpus and highlight tests
        run: npx tree-sitter test

  corpus:
    name: Parse the Extempore source tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Generate parser
        run: npx tree-sitter generate

      - name: Checkout Extempore (.xtm sources only)
        uses: actions/checkout@v4
        with:
          repository: extemporelang/extempore
          path: extempore
          # The grammar tracks the language, so test against the tip of master.
          ref: master

      - name: Parse every .xtm file (fail on any parse error)
        run: ./script/parse-corpus.sh extempore
